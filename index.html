<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>智能文档问答</title>

<style>
body {
    margin: 0;
    font-family: "Arial";
    background: linear-gradient(135deg, #ffe4ec, #fff0f5);
}

.container {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 105, 135, 0.2);
}

h2 {
    text-align: center;
    color: #ff4d6d;
}

/* 上传区域 */
.upload-box {
    text-align: center;
    margin-bottom: 20px;
}

button {
    background: #ff6b81;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff4d6d;
}

/* 进度条 */
.progress {
    width: 100%;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
}

.progress-bar {
    height: 8px;
    width: 0%;
    background: #ff6b81;
    transition: width 0.3s;
}

/* 聊天框 */
.chat-box {
    max-height: 400px;
    overflow-y: auto;
    padding: 10px;
    border: 1px solid #f3c6d3;
    border-radius: 10px;
    background: #fffafa;
}

/* 气泡 */
.msg {
    margin: 10px 0;
    display: flex;
}

.user {
    justify-content: flex-end;
}

.ai {
    justify-content: flex-start;
}

.bubble {
    padding: 10px;
    border-radius: 12px;
    max-width: 70%;
}

.user .bubble {
    background: #ffccd5;
}

.ai .bubble {
    background: #ffe4ec;
}

/* 输入框 */
.input-box {
    display: flex;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* loading */
.loading {
    font-size: 12px;
    color: #999;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="container">

<h2>💗 智能文档问答系统</h2>

<!-- 上传 -->
<div class="upload-box">
    <input type="file" id="file">
    <button onclick="upload()">上传PDF</button>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div id="uploadStatus"></div>
</div>

<!-- 聊天 -->
<div class="chat-box" id="chatBox"></div>

<div class="input-box">
    <input id="query" placeholder="请输入你的问题...">
    <button onclick="ask()">发送</button>
</div>

</div>

<script>

// ================= 上传 =================
function upload() {
    const file = document.getElementById("file").files[0];
    const formData = new FormData();
    formData.append("file", file);

    const xhr = new XMLHttpRequest();

    xhr.open("POST", "http://127.0.0.1:5000/upload");

    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById("progressBar").style.width = percent + "%";
        }
    };

    xhr.onload = function() {
        document.getElementById("uploadStatus").innerText = "✅ 上传完成";
    };

    xhr.send(formData);
}

// ================= 聊天 =================
async function ask() {
    const query = document.getElementById("query").value;
    const chatBox = document.getElementById("chatBox");

    // 用户气泡
    chatBox.innerHTML += `
        <div class="msg user">
            <div class="bubble">${query}</div>
        </div>
    `;

    // loading
    const loadingId = Date.now();
    chatBox.innerHTML += `
        <div class="msg ai" id="${loadingId}">
            <div class="bubble">🤖 思考中...</div>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    const res = await fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query })
    });

    const data = await res.json();

    // 替换loading
    document.getElementById(loadingId).innerHTML = `
        <div class="bubble">${data.answer}</div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
